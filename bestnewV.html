<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мыкты мугалим 2026 | Кангельдиева Алиса Акылбековна</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: sans-serif;
            background: #fff;
            color: #000;
        }

        .award-card {
            background: #fff;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid #eee;
        }

        .accent-icon {
            color: orange;
        }

        .dark-mode {
            background: #111;
            color: #fff;
        }
    

        body.menu-open {
            overflow: hidden;
            touch-action: none;
        }

        .sidebar-transition {
            transition: transform 0.35s ease;
        }

        .mobile-sidebar {
            background: #101113;
            color: #f5f5f5;
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 18px 16px 10px;
            min-height: 72px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .sidebar-close {
            width: 56px;
            height: 56px;
            border: 0;
            border-radius: 0;
            background: rgba(255,255,255,0.08);
            color: #d1d5db;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-menu {
            padding: 0;
        }

        .sidebar-main-link {
            display: block;
            padding: 20px 28px;
            background: rgba(255,255,255,0.12);
            color: #f3f4f6;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
        }

        .sidebar-group {
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-group summary {
            list-style: none;
            cursor: pointer;
            position: relative;
            padding: 18px 48px 14px 40px;
            color: #d1d5db;
            font-size: 17px;
            font-weight: 500;
        }

        .sidebar-group summary::-webkit-details-marker {
            display: none;
        }

        .sidebar-group summary::before {
            content: '⌄';
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-56%);
            font-size: 20px;
            color: #d1d5db;
        }

        .sidebar-group:not([open]) summary::before {
            transform: translateY(-56%) rotate(-90deg);
        }

        .sidebar-submenu {
            padding: 2px 0 14px;
        }

        .sidebar-submenu .sidebar-item {
            display: block;
            text-decoration: none;
            color: #e5e7eb;
            font-size: 17px;
            line-height: 1.35;
            padding: 12px 28px 12px 76px;
            opacity: 0.95;
        }

        .sidebar-submenu .sidebar-item:hover,
        .sidebar-main-link:hover {
            background: rgba(255,255,255,0.06);
        }

        .sidebar-item.current-page {
            color: #ffffff !important;
            background: rgba(255,255,255,0.10);
            font-weight: 700;
        }

        .dark-mode .mobile-sidebar {
            background: #0f1012;
        }

        @media (min-width: 768px) {
            .mobile-sidebar {
                width: 360px;
            }
        }

    </style>
</head>

<body>

<main class="py-20 px-6">
<div class="max-w-6xl mx-auto">

<!-- HEADER -->
<header class="text-center mb-16">
    <h1 class="text-4xl font-bold italic">Мыкты мугалим 2026</h1>
    <p class="mt-4 text-gray-500">
        Эмне үчүн мен катышып жатам
    </p>
</header>

<!-- GRID -->
<section class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<!-- ТЕКСТ -->
<div class="award-card lg:col-span-2">
    <h2 class="text-2xl font-bold italic mb-4">
        Эмне үчүн мен катышып жатам?
    </h2>

    <p>
        Мен үчүн бул конкурс жөн гана катышуу эмес — бул өз деңгээлимди көрсөтүү.
    </p>
</div>

<!-- ВИДЕО -->
<div class="award-card">
    <div class="accent-icon text-3xl mb-4">
        <i class="fas fa-video"></i>
    </div>

    <h3 class="text-xl font-bold mb-4">Видео</h3>

    <div class="rounded-3xl overflow-hidden aspect-video">
        <iframe 
            src="https://www.youtube.com/embed/toADN0QVzsI"
            class="w-full h-full"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</div>

<!-- КАРТИНКА -->
<div class="award-card">

    <div class="accent-icon text-3xl mb-4">
        <i class="fas fa-image"></i>
    </div>

    <h3 class="text-xl font-bold mb-4">
        Кангельдиева Алиса Акылбековна
    </h3>

    <!-- ВОТ ТУТ КАРТИНКА -->
    <div class="rounded-3xl overflow-hidden mb-4">
        <img 
            src="teacher3.jpg" 
            class="w-full h-[420px] object-cover"
            alt="teacher">
    </div>

    <p class="text-sm text-gray-500">
        Биология мугалими
    </p>

</div>

</section>
</div>
</main>

</body>
</html>
